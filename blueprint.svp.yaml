svp_version: "0.1.0"
level: 5

project:
  name: "e-commerce-order-service"
  description: "电商订单服务 - SVP 演示项目"
  version: "1.0.0"

intent:
  problem: "电商订单流程复杂，涉及库存、支付、物流多个系统，容易出错"
  solution: "提供统一的订单编排服务，处理状态机和异常恢复"
  successCriteria:
    - "订单状态一致性 99.99%"
    - "异常订单自动恢复率 > 95%"
    - "人工介入处理时间 < 5分钟"

constraints:
  functional:
    - "支持下单、支付、发货、完成、取消状态"
    - "支持部分退款"
    - "支持订单超时自动取消"
  non_functional:
    - "P99 响应时间 < 200ms"
    - "系统可用性 > 99.9%"
  business:
    - "符合 PCI-DSS 支付安全标准"

domains:
  - name: "Order"
    responsibility: "订单状态管理和生命周期控制"
    boundaries:
      in_scope:
        - "订单状态机"
        - "订单数据持久化"
        - "订单超时处理"
      out_of_scope:
        - "库存扣减逻辑（调用 Inventory 服务）"
        - "支付处理（调用 Payment 服务）"
    dependencies: ["Inventory", "Payment"]

  - name: "Inventory"
    responsibility: "库存查询和预占"
    boundaries:
      in_scope:
        - "库存查询"
        - "库存预占"
        - "库存释放"
    dependencies: []

  - name: "Payment"
    responsibility: "支付处理"
    boundaries:
      in_scope:
        - "支付创建"
        - "支付查询"
        - "退款处理"
    dependencies: []

integrations:
  - name: "PostgreSQL"
    type: database
    description: "订单主数据存储"
  
  - name: "Redis"
    type: database
    description: "订单状态缓存和分布式锁"

context:
  designDocs: []
  environment:
    - name: "DATABASE_URL"
      description: "PostgreSQL 连接字符串"
      required: true
    - name: "REDIS_URL"
      description: "Redis 连接字符串"
      required: true
